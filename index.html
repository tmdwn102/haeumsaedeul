<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SCAN_SYSTEM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #f0eee9; font-family: 'Courier New', monospace; padding: 2rem; min-height: 100vh; }
  h1 { font-size: 11px; letter-spacing: 0.2em; color: #555; margin-bottom: 2rem; }
  select, button { background: #111; color: #f0eee9; border: 0.5px solid #333; padding: 0.5rem 1rem; font-family: inherit; font-size: 13px; cursor: pointer; }
  select { width: 100%; margin-bottom: 1rem; }
  .upload-area { border: 0.5px solid #333; padding: 2rem; text-align: center; cursor: pointer; margin-bottom: 1rem; color: #666; font-size: 12px; }
  .upload-area:hover { border-color: #555; }
  #preview { display: none; margin-bottom: 1rem; }
  #preview img { max-width: 180px; max-height: 180px; filter: grayscale(30%); }
  button { width: 100%; padding: 0.7rem; letter-spacing: 0.1em; }
  button:hover { background: #1a1a1a; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  .output { margin-top: 2rem; border: 0.5px solid #222; }
  .output-header { padding: 0.5rem 1rem; border-bottom: 0.5px solid #222; font-size: 10px; color: #444; letter-spacing: 0.15em; }
  .output-text { padding: 1.5rem; font-size: 13px; line-height: 2; color: #aaa; white-space: pre-wrap; min-height: 150px; }
  .label { font-size: 10px; color: #444; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
</style>
</head>
<body>

<h1>BIOMETRIC_SCAN_SYSTEM v0.1 — 사물이 기억하는 초상</h1>

<div class="label">ANALYSIS_TARGET</div>
<select id="partSelect">
  <option value="전체 얼굴">전체 얼굴</option>
  <option value="눈 (좌)">눈 (좌)</option>
  <option value="눈 (우)">눈 (우)</option>
  <option value="코">코</option>
  <option value="입">입</option>
</select>

<div class="label">IMAGE_INPUT</div>
<div class="upload-area" onclick="document.getElementById('fileInput').click()">
  클릭하여 이미지 로드<br>
  <span style="font-size:10px;color:#333;margin-top:4px;display:block;">JPG / PNG</span>
  <input type="file" id="fileInput" accept="image/*" style="display:none">
</div>

<div id="preview"><img id="previewImg" src="" alt=""></div>

<button id="analyzeBtn" disabled onclick="analyze()">EXECUTE_SCAN</button>

<div class="output" id="outputBox" style="display:none">
  <div class="output-header" id="outputHeader">SCAN_OUTPUT.LOG</div>
  <div class="output-text" id="outputText"></div>
</div>

<script>
  let imageBase64 = null;
  let imageMime = 'image/jpeg';

  document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    imageMime = file.type || 'image/jpeg';
    const reader = new FileReader();
    reader.onload = function(ev) {
      imageBase64 = ev.target.result.split(',')[1];
      document.getElementById('previewImg').src = ev.target.result;
      document.getElementById('preview').style.display = 'block';
      document.getElementById('analyzeBtn').disabled = false;
    };
    reader.readAsDataURL(file);
  });

  async function analyze() {
    const btn = document.getElementById('analyzeBtn');
    const outputBox = document.getElementById('outputBox');
    const outputText = document.getElementById('outputText');
    const outputHeader = document.getElementById('outputHeader');
    const part = document.getElementById('partSelect').value;

    btn.disabled = true;
    btn.textContent = 'SCANNING...';
    outputBox.style.display = 'block';
    outputText.textContent = '> 데이터 수집 중...\n> 감정 필터 제거 중...\n> 수치 변환 중...';

    // ⚠️ 여기에 Gemini API 키 입력
    const GEMINI_API_KEY = 'YOUR_GEMINI_API_KEY';

    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              {
                inline_data: {
                  mime_type: imageMime,
                  data: imageBase64
                }
              },
              {
                text: `당신은 감정이 없는 생체 스캐닝 시스템입니다.

규칙:
- 감정 형용사 절대 사용 금지 (아름다운, 날카로운, 슬픈 등)
- [부위] : [수치 또는 방향 또는 상태] 형식으로만 출력
- 한국어로 출력  
- 6~8개 항목, 각 항목 한 줄
- 가능하면 mm, 도(°), % 단위 추정값 포함

이 이미지의 [${part}] 부위를 스캔하여 데이터를 출력하라.`
              }
            ]
          }]
        })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(JSON.stringify(err, null, 2));
      }

      const data = await res.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '출력 없음';
      const now = new Date();
      outputHeader.textContent = `SCAN_OUTPUT.LOG  ·  ${now.toLocaleTimeString('ko-KR')}`;
      outputText.textContent = `[SUBJECT: UNKNOWN]\n[PART: ${part}]\n[STATUS: COMPLETE]\n\n` + text;

    } catch (err) {
      outputText.textContent = `[ERROR]\n\n${err.message}`;
    }

    btn.disabled = false;
    btn.textContent = 'EXECUTE_SCAN';
  }
</script>
</body>
</html>
